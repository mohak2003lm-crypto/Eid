<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معايدة</title>

<!-- خط Pixel -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  background: #6a0dad;
  overflow: hidden;
  text-align: center;
  color: white;
  font-family: 'Press Start 2P', cursive;
}

/* زخارف */
body::before {
  content: "🌙 ✨ 🕌 ✨ 🌙";
  position: absolute;
  width: 100%;
  top: 20px;
  font-size: 30px;
  opacity: 0.4;
}

/* النص */
h1 {
  margin-top: 25%;
  font-size: 28px;
  animation: fadeIn 2s ease-in-out;
}

/* صورة العملة */
<img src="money.jpg" alt="عيدية نور">
  margin-top: 40px;
  width: 250px;
  border-radius: 10px;
  animation: fadeIn 3s ease-in-out;
}

/* أنيميشن */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<h1>عيدچ مبارك نور 🫵🏼</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Iraqi_50000_dinars_obverse.jpg">

<!-- موسيقى -->
<audio autoplay loop>
  <source src="https://www.myinstants.com/media/sounds/eid-song.mp3" type="audio/mpeg">
</audio>

</body>
</html>
