<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد مبارك - نور</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0; padding: 0;
    background: linear-gradient(to bottom, #6a0dad, #240b36);
    color: white; font-family: 'Bungee Shade', cursive;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; text-align: center; overflow: hidden;
    position: relative;
  }

  /* الزر القرمزي الأفتح مع الظل الأبيض والموقع الجديد */
  .danger-btn {
    position: absolute;
    top: 50px; 
    left: 30px;
    padding: 12px 25px;
    font-size: 1rem;
    background: #ff1a1a; /* لون قرمزي أفتح وأوضح */
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    z-index: 1000;
    transition: 0.3s;
    font-family: 'Bungee Shade', cursive;
    /* ظل أبيض خلف الزر */
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
  }

  .danger-btn:hover {
    transform: scale(1.1);
    background: #ff4d4d; /* يفتح أكثر عند التمرير */
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.9);
  }

  .bg-decor {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1; pointer-events: none;
  }

  .symbol {
    position: absolute; color: rgba(247, 183, 49, 0.4);
    font-size: 1.5rem; animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .container { z-index: 10; position: relative; padding: 20px; }

  h1 { font-size: 2.5rem; margin-bottom: 20px; }

  .gift-img {
    width: 250px; max-width: 80%; border-radius: 15px;
    display: none; margin: 10px auto;
    animation: popIn 0.6s forwards;
  }

  .btn {
    padding: 15px 35px; font-size: 1.2rem;
    background: #f7b731; color: #4b0082;
    border: none; border-radius: 50px; cursor: pointer;
    margin-top: 15px; font-family: 'Bungee Shade', cursive;
  }

  #doubleBtn { background: #00ffcc; color: #240b36; display: none; }

  /* صفحة الـ QR القرمزية المتدرجة (ثابتة بدون عناصر متساقطة) */
  .romantic-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    /* تدرج من القرمزي للون أغمق */
    background: linear-gradient(135deg, #a00000 0%, #4d0000 100%);
    z-index: 2000; display: none;
    flex-direction: column; align-items: center; justify-content: center;
  }

  .qr-img {
    width: 280px;
    border: 5px solid white;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(255,255,255,0.3);
    animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
</style>
</head>
<body>

  <button class="danger-btn" onclick="goRomantic()">لاتدوسني 🙄</button>

  <div id="romanticPage" class="romantic-overlay">
    <h1 style="color: #ffcccc; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">  👥 </h1>
    <img src="qr.jpg" alt="QR Code" class="qr-img">
    <p style="margin-top: 20px; font-size: 1.2rem; color: #ff9999;"></p>
  </div>

  <div class="bg-decor" id="decor"></div>

  <div class="container">
    <h1>هابي عيد نورة 🫵🏼🎉</h1>
    <img src="money.jpg" id="moneyImg" class="gift-img">
    <img src="gor.JPG" id="gorImg" class="gift-img">
    <br>
    <button id="surpriseBtn" class="btn" onclick="openSurprise()">العيدية </button>
    <button id="doubleBtn" class="btn" onclick="doubleSurprise()">مضاعفة العيدية 🔥</button>
  </div>

  <audio id="music1"><source src="music.mp3" type="audio/mpeg"></audio>
  <audio id="music2"><source src="fa.mp3" type="audio/mpeg"></audio>

  <script>
    const decorContainer = document.getElementById('decor');
    const normalIcons = ['🌙', '✨', '🕌', '⭐', '🎈'];
    
    // إنشاء الزينة المتساقطة
    function createDecor() {
      decorContainer.innerHTML = '';
      for (let i = 0; i < 40; i++) {
        let span = document.createElement('span');
        span.className = 'symbol';
        span.innerText = normalIcons[Math.floor(Math.random() * normalIcons.length)];
        span.style.left = Math.random() * 100 + 'vw';
        span.style.animationDuration = (Math.random() * 5 + 3) + 's';
        decorContainer.appendChild(span);
      }
    }

    // البدء بالزينة العادية
    createDecor();

    function openSurprise() {
      document.getElementById('moneyImg').style.display = 'block';
      document.getElementById('music1').play();
      document.getElementById('surpriseBtn').style.display = 'none';
      document.getElementById('doubleBtn').style.display = 'inline-block';
    }

    function doubleSurprise() {
      document.getElementById('music1').pause();
      document.getElementById('music2').play();
      document.getElementById('gorImg').style.display = 'block';
      document.getElementById('doubleBtn').style.display = 'none';
    }

    // الانتقال للصفحة القرمزية وإيقاف التساقط
    function goRomantic() {
      document.getElementById('romanticPage').style.display = 'flex';
      // إيقاف الزينة المتساقطة (الورود والقلوب) عن طريق حذفها
      decorContainer.innerHTML = ''; 
    }
  </script>
</body>
</html>
