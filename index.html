<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد مبارك - نور</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    background: #4b0082; /* بنفسجي غامق ملكي */
    background: linear-gradient(to bottom, #6a0dad, #240b36);
    color: white;
    font-family: 'Cairo', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
    position: relative;
  }

  /* زخارف متحركة تملأ الخلفية */
  .background-decor {
    position: absolute;
    top: -10%;
    width: 100%;
    height: 110%;
    z-index: 0;
    pointer-events: none;
  }

  .symbol {
    position: absolute;
    color: rgba(247, 183, 49, 0.3); /* ذهبي شفاف */
    font-size: 1.5rem;
    animation: fall linear infinite;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); }
  }

  /* محتوى الصفحة */
  .content {
    z-index: 10;
    position: relative;
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(247, 183, 49, 0.5);
  }

  .money-img {
    width: 280px;
    max-width: 80%;
    border-radius: 20px;
    border: 4px solid #f7b731;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    display: none;
    animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  .btn {
    padding: 18px 45px;
    font-size: 1.3rem;
    background: #f7b731;
    color: #4b0082;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
  }

  .btn:hover { transform: scale(1.1); background: #fff; }

  @keyframes zoomIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

  <div class="background-decor" id="decorContainer"></div>

  <div class="content">
    <h1>عيدچ مبارك نور 🫵🏼</h1>
    
    <img src="Money.jpg.JPG" id="gift" class="money-img" alt="العيدية">

    <br>
    <button id="playBtn" class="btn" onclick="startShow()">فتحي العيدية 🎁</button>
  </div>

  <audio id="eidMusic" loop>
    <source src="https://www.myinstants.com/media/sounds/eid-song.mp3" type="audio/mpeg">
  </audio>

  <script>
    // توليد زخارف عشوائية تتساقط
    const container = document.getElementById('decorContainer');
    const symbols = ['🌙', '✨', '🕌', '⭐', '🎈'];
    
    for (let i = 0; i < 40; i++) {
      let div = document.createElement('div');
      div.className = 'symbol';
      div.innerText = symbols[Math.floor(Math.random() * symbols.length)];
      div.style.left = Math.random() * 100 + 'vw';
      div.style.animationDuration = (Math.random() * 3 + 2) + 's';
      div.style.delay = Math.random() * 5 + 's';
      div.style.opacity = Math.random();
      container.appendChild(div);
    }

    function startShow() {
      document.getElementById('gift').style.display = 'inline-block';
      document.getElementById('eidMusic').play();
      document.getElementById('playBtn').style.display = 'none';
      
      // إضافة تأثير هز خفيف للنص عند التشغيل
      document.querySelector('h1').style.animation = 'none';
    }
  </script>

</body>
</html>
