<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معايدة لنور</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    background: #6a0dad; /* اللون البنفسجي */
    overflow: hidden;
    text-align: center;
    color: white;
    font-family: 'Press Start 2P', cursive; /* استخدام خط البكسل */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  /* زخارف علوية */
  .decor {
    position: absolute;
    top: 5%;
    font-size: 1.5rem;
    opacity: 0.6;
    letter-spacing: 10px;
  }

  /* تنسيق النص (عيدچ مبارك) */
  h1 {
    font-size: 1.8rem;
    margin-bottom: 30px;
    margin-top: 0;
  }

  /* تنسيق صورة العملة (الذي ذكرته أنت) */
  img {
    margin-top: 40px; 
    width: 250px;
    border-radius: 10px;
    animation: fadeIn 3s ease-in-out; /* حركة الظهور */
  }

  /* أنيميشن الظهور (Fade In) */
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

</style>
</head>

<body>

  <div class="decor">🌙 ✨ 🕌 ✨ 🌙</div>

  <h1>عيدچ مبارك نور 🫵🏼</h1>

  <img src="money.JPG" alt="عيدية نور">

</body>
</html>
