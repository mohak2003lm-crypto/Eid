<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد مبارك - نور</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, #6a0dad, #240b36); /* تدرج بنفسجي فخم */
    color: white;
    /* تطبيق خط Bungee Shade */
    font-family: 'Bungee Shade', cursive; 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
    position: relative;
  }

  /* زخارف الخلفية المتساقطة للعيد */
  .bg-decor {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  .symbol {
    position: absolute;
    color: rgba(247, 183, 49, 0.4);
    font-size: 1.5rem;
    animation: fall linear infinite;
  }

  /* تأثير ألعاب نارية بسيط */
  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
    50% { transform: translateY(50vh) rotate(180deg); opacity: 1; color: #ff00ff; /* تغيير اللون منتصف التساقط */ }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* المحتوى الرئيسي */
  .container {
    z-index: 10;
    position: relative;
    padding: 20px;
  }

  h1 {
    font-size: 3rem; /* حجم كبير للخط المميز */
    margin-bottom: 25px;
    text-shadow: 0 5px 15px rgba(0,0,0,0.3);
    color: #f7b731; /* لون ذهبي للنص */
  }

  /* تنسيق الصورة (العيدية) */
  .gift-img {
    width: 280px;
    max-width: 85%;
    border-radius: 20px;
    border: 4px solid #f7b731; /* إطار ذهبي */
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    display: none; /* مخفية بالبداية */
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  /* زر المفاجأة */
  .btn {
    padding: 18px 45px;
    font-size: 1.5rem;
    background: #f7b731;
    color: #4b0082;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: 0.3s ease;
    font-family: 'Bungee Shade', cursive; /* تطبيق الخط على الزر أيضاً */
  }

  .btn:active { transform: scale(0.9); }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

  <div class="bg-decor" id="decor"></div>

  <div class="container">
    <h1>هابي عيد نور 🫵🏼🎉</h1>
    
    <img src="money.jpg" id="moneyImg" class="gift-img" alt="عيدية">

    <br><br>
    <button id="surpriseBtn" class="btn" onclick="openSurprise()">العيدية 🎁</button>
  </div>

  <audio id="eidMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    // توليد زخارف عشوائية للعيد
    const decorContainer = document.getElementById('decor');
    const icons = ['🌙', '✨', '🕌', '⭐', '🎈', '🎆', '🎁'];
    const colors = ['#f7b731', '#ff00ff', '#00ffff', '#00ff00']; // ألوان عشوائية للزخارف
    
    for (let i = 0; i < 40; i++) {
      let span = document.createElement('span');
      span.className = 'symbol';
      span.innerText = icons[Math.floor(Math.random() * icons.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.top = '-' + (Math.random() * 100) + 'vh'; // بداية عشوائية خارج الشاشة
      span.style.animationDuration = (Math.random() * 5 + 3) + 's';
      span.style.color = colors[Math.floor(Math.random() * colors.length)]; // لون عشوائي
      span.style.opacity = Math.random();
      decorContainer.appendChild(span);
    }

    // وظيفة المفاجأة
    function openSurprise() {
      const img = document.getElementById('moneyImg');
      const music = document.getElementById('eidMusic');
      const btn = document.getElementById('surpriseBtn');

      img.style.display = 'inline-block'; // إظهار الصورة
      music.play(); // تشغيل الموسيقى
      btn.style.display = 'none'; // إخفاء الزر
    }
  </script>

</body>
</html>
